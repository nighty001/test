d-i auto-install/enable boolean true
d-i debconf/priority string critical
d-i debian-installer/locale string de_DE.UTF-8
d-i keyboard-configuration/xkb-keymap select de
d-i netcfg/enable boolean false
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Berlin
d-i partman-auto/method string regular
d-i partman/early_command string \
  DISK=""; \
  for candidate in /dev/nvme*n1 /dev/sd? /dev/mmcblk?; do \
    [ -b "$candidate" ] || continue; \
    block="${candidate#/dev/}"; \
    path="$(readlink -f "/sys/block/$block/device" 2>/dev/null || true)"; \
    case "$path" in *usb*) continue ;; esac; \
    removable="$(cat "/sys/block/$block/removable" 2>/dev/null || echo 1)"; \
    [ "$removable" = 0 ] || continue; \
    DISK="$candidate"; break; \
  done; \
    [ -n "$DISK" ] || exit 1; \
  debconf-set partman-auto/disk "$DISK"; \
  debconf-set grub-installer/bootdev "$DISK"
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Kiosk
d-i passwd/username string kiosk
d-i passwd/user-password password kiosk
d-i passwd/user-password-again password kiosk
d-i user-setup/allow-password-weak boolean true
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/force-efi-extra-removable boolean true
d-i apt-setup/use_mirror boolean false
d-i popularity-contest/participate boolean false
d-i pkgsel/upgrade select none
d-i cdrom-detect/eject boolean true
d-i finish-install/reboot_in_progress note
